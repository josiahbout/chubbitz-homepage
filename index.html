<!-- ================================================================
  HOW TO EDIT THIS PAGE
  1. Change the name / tagline in the <header> section below.
  2. Edit the LINKS list further down — each <a class="link-card">
     is one button. Change the href, the label text, and the small
     description line.
  3. Replace "MT" in the logo mark with your own initials/mark if
     you want, or swap it for an <img> tag pointing at a logo file.
  4. Save this file as index.html at the ROOT of your GitHub repo
     (same folder as your CNAME file), commit, and push. GitHub
     Pages will pick it up automatically — no build step needed.
================================================================= -->

<style>
  :root {
    --bg: #0e0d12;
    --panel: #17161d;
    --panel-border: #2a2830;
    --text: #f3f1ea;
    --text-muted: #8b889c;
    --gold: #c8a662;
    --violet: #6e7bff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 64px 20px 80px;
    background-image:
      radial-gradient(circle at 50% -10%, rgba(110, 123, 255, 0.10), transparent 45%),
      radial-gradient(circle at 50% 110%, rgba(200, 166, 98, 0.08), transparent 50%);
  }

  .page {
    width: 100%;
    max-width: 480px;
  }

  /* ---------- Header / mark ---------- */

  header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    margin-bottom: 48px;
  }

  .mark {
    position: relative;
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.02em;
    color: var(--text);
    overflow: visible;
    margin-bottom: 20px;
  }

  .mark img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
  }

  /* signature: a small twinkling sparkle at the corner of the mark */
  .mark .sparkle {
    position: absolute;
    top: -7px;
    right: -7px;
    width: 18px;
    height: 18px;
    animation: twinkle 2.4s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.35; transform: scale(0.75) rotate(0deg); }
    50%      { opacity: 1;    transform: scale(1.15) rotate(8deg); }
  }

  h1 {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
  }

  .tagline {
    font-size: 14px;
    color: var(--text-muted);
    max-width: 320px;
    line-height: 1.5;
    margin: 0;
  }

  /* ---------- Link cards ---------- */

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-card {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 16px 20px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    overflow: hidden;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }

  .link-card:hover,
  .link-card:focus-visible {
    transform: translateY(-2px);
    border-color: rgba(200, 166, 98, 0.5);
    background: #1c1b23;
  }

  .link-card:focus-visible {
    outline: 2px solid var(--violet);
    outline-offset: 2px;
  }

  .link-card .label {
    font-weight: 600;
    font-size: 15px;
  }

  .link-card .desc {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* hover sweep, echoes the header mark's light pass */
  .link-card::after {
    content: "";
    position: absolute;
    top: 0;
    left: -30%;
    width: 24%;
    height: 100%;
    background: linear-gradient(
      100deg,
      transparent,
      rgba(255, 255, 255, 0.06),
      transparent
    );
    transform: skewX(-20deg);
    transition: left 0.5s ease;
    pointer-events: none;
  }

  .link-card:hover::after {
    left: 130%;
  }

  /* copy-email button needs to look identical to the <a> link-cards */
  button.link-card {
    width: 100%;
    font-family: inherit;
    text-align: left;
    cursor: pointer;
  }

  /* ---------- Social icons ---------- */

  .socials {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 36px;
  }

  .socials a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text-muted);
    transition: transform 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }

  .socials a svg {
    width: 19px;
    height: 19px;
    fill: currentColor;
  }

  .socials a:hover,
  .socials a:focus-visible {
    transform: translateY(-2px);
    border-color: rgba(200, 166, 98, 0.5);
    color: var(--gold);
  }

  /* ---------- Footer ---------- */

  footer {
    margin-top: 48px;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }

  footer a {
    color: var(--text-muted);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    .mark .sparkle,
    .link-card::after {
      animation: none;
      transition: none;
      display: none;
    }
  }
</style>
</head>

<script>
  function copyEmail(btn) {
    const email = "hello@thechubbitz.com";
    const label = btn.querySelector(".label");
    const original = label.textContent;

    function showCopied() {
      label.textContent = "Email copied to clipboard!";
      setTimeout(() => { label.textContent = original; }, 2000);
    }

    function fallbackCopy() {
      const temp = document.createElement("textarea");
      temp.value = email;
      temp.style.position = "fixed";
      temp.style.opacity = "0";
      document.body.appendChild(temp);
      temp.select();
      try {
        document.execCommand("copy");
      } catch (e) {
        // ignore, message still shows
      }
      document.body.removeChild(temp);
      showCopied();
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(email).then(showCopied).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
  }
</script>
